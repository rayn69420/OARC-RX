name: Build And Publish Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read mod metadata
        id: meta
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          info = json.loads(Path("info.json").read_text(encoding="utf-8"))
          mod_name = info["name"]
          version = info["version"]

          print(f"name={mod_name}")
          print(f"version={version}")
          print(f"folder={mod_name}_{version}")
          print(f"zip={mod_name}_{version}.zip")
          PY

      - name: Build mod zip
        shell: bash
        run: |
          python - <<'PY'
          import json
          import shutil
          import zipfile
          from pathlib import Path

          root = Path(".").resolve()
          info = json.loads((root / "info.json").read_text(encoding="utf-8"))
          mod_name = info["name"]
          version = info["version"]
          folder_name = f"{mod_name}_{version}"
          build_dir = root / "build"
          stage_dir = build_dir / folder_name
          zip_path = build_dir / f"{folder_name}.zip"
          excludes = {".git", ".github", ".vscode", "build", "__pycache__"}

          if build_dir.exists():
              shutil.rmtree(build_dir)

          stage_dir.mkdir(parents=True, exist_ok=True)

          for item in root.iterdir():
              if item.name in excludes:
                  continue
              destination = stage_dir / item.name
              if item.is_dir():
                  shutil.copytree(
                      item,
                      destination,
                      ignore=shutil.ignore_patterns("__pycache__", "*.pyc")
                  )
              else:
                  shutil.copy2(item, destination)

          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as archive:
              for path in stage_dir.rglob("*"):
                  archive.write(path, path.relative_to(build_dir))

          print(f"Built {zip_path}")
          PY

      - name: Move rolling release tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa continuous -m "Continuous build for ${GITHUB_SHA}"
          git push origin refs/tags/continuous --force

      - name: Write release notes
        shell: bash
        run: |
          cat > release-notes.txt <<EOF
          Auto-updated build from commit \`${GITHUB_SHA}\` on branch \`${GITHUB_REF_NAME}\`.

          Installation:
          1. Download \`${{ steps.meta.outputs.zip }}\` from this release.
          2. Copy it to \`%AppData%\\Factorio\\mods\`.
          3. Remove or disable older \`OARC_hidden_relic\` copies to avoid command conflicts.
          4. Enable \`oarc-rx\` in Factorio's Mods menu.

          Project page and bug reports:
          https://github.com/${GITHUB_REPOSITORY}
          EOF

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ZIP_PATH="build/${{ steps.meta.outputs.zip }}"

          if gh release view continuous >/dev/null 2>&1; then
            gh release edit continuous --title "Continuous Build" --notes-file release-notes.txt --prerelease
            gh release upload continuous "$ZIP_PATH" --clobber
          else
            gh release create continuous "$ZIP_PATH" --title "Continuous Build" --notes-file release-notes.txt --prerelease
          fi
